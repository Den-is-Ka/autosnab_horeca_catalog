services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    image: autosnab-horeca-catalog:local
    container_name: autosnab-horeca-catalog

    ports:
      - "3001:3000"

    env_file:
      - .env.local

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

